openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture and management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      description: Returns all submitted leads, most recent first
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a new lead
      description: Captures a contact request from the public site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead's status or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lead deleted
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /leads/stats:
    get:
      operationId: getLeadStats
      tags: [leads]
      summary: Lead funnel summary
      description: Aggregated counts of leads by status and recent totals
      responses:
        "200":
          description: Lead statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Lead:
      type: object
      required:
        - id
        - name
        - status
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        serviceInterest:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        status:
          type: string
          enum: [new, contacted, won, lost]
        createdAt:
          type: string
          format: date-time
    LeadInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        serviceInterest:
          type: string
        message:
          type: string
    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, won, lost]
        message:
          type: string
    LeadStats:
      type: object
      required:
        - total
        - new
        - contacted
        - won
        - lost
        - last7Days
      properties:
        total:
          type: integer
        new:
          type: integer
        contacted:
          type: integer
        won:
          type: integer
        lost:
          type: integer
        last7Days:
          type: integer
