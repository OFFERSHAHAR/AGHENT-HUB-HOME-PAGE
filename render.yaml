services:
  - type: web
    name: ahgae-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ahgae-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LEADS_NOTIFY_EMAIL
        value: agenthubguru@gmail.com
      - key: SMTP_USER
        value: agenthubguru@gmail.com
      - key: SMTP_PASS
        sync: false

databases:
  - name: ahgae-db
    databaseName: ahgae
    user: ahgae
    plan: free
